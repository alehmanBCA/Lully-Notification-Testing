{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Create Admin</title>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <style>
    .create-card { max-width:640px; margin:28px auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 8px 24px rgba(6,41,70,0.06); }
    .form-row { margin-bottom:12px; }
    label { display:block; font-weight:700; margin-bottom:6px; color:#0b4a66 }
    input[type="text"], input[type="email"], input[type="password"] { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #d8eaf6 }
    .form-actions { display:flex; gap:12px; margin-top:14px }
  </style>
</head>
<body class="dashboard-page">
  <main class="dashboard-shell">
    <div class="create-card">
      <h2>Create admin account</h2>
      <form method="post">
        {% csrf_token %}
        <div class="form-row">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required>
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email">
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>
        </div>
        <div class="form-row">
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" name="confirm_password" type="password" required>
        </div>

        <div class="form-actions">
          <button class="btn primary" type="submit">Create admin</button>
          <a class="btn ghost" href="{% url 'admin_users' %}">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
