<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lully</title>
</head>
<body>
    <h1>Temperature</h1>
    <p id="temp">Loading...</p>
    <p id="hr">Loading...</p>

    <script>
        async function fetchHeartRate() {
            try {
                const res = await fetch('http://localhost:3000/api/hr');
                if (!res.ok) throw new Error('Network response failure: ' + res.status);
                const data = await res.json();
                document.getElementById('hr').textContent = data.heartRate + ' bpm';
            } catch (error) {
                console.error('Error fetching heart rate', error);
                document.getElementById('hr').textContent = 'error';
            }
        }

        async function fetchTemperature() {
            try {
                const res = await fetch('http://localhost:3000/api/temperature');
                if (!res.ok) throw new Error('Network response failure: ' + res.status);
                const data = await res.json();
                document.getElementById('temp').textContent = data.temperatureF + ' °F';
            } catch (error) {
                console.error('Error fetching temperature', error);
                document.getElementById('temp').textContent = 'error';
            }
        }

        fetchTemperature();
        setInterval(fetchHeartRate, 1000);
        setInterval(fetchTemperature, 1000);
    </script>

    <script src="/src/js/app.js"></script>
</body>
</html>
