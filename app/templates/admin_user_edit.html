{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit User</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <style>
    /* Card and form layout */
    .edit-card { max-width:640px; margin:28px auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 8px 24px rgba(6,41,70,0.06); }
    .form-row { margin-bottom:12px; }
    label { display:block; font-weight:700; margin-bottom:6px; color:#0b4a66 }
    input[type="text"], input[type="email"] { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #d8eaf6; font-size:16px }
    .form-actions { display:flex; gap:12px; margin-top:18px }

    /* Touch-friendly buttons */
    .btn { display:inline-block; padding:10px 14px; border-radius:10px; text-decoration:none; text-align:center; cursor:pointer; }
    .btn.primary { background:#0077cc; color:#fff; border:none }
    .btn.ghost { background:transparent; color:#0077cc; border:1px solid rgba(0,119,204,0.12) }

    /* Responsive: stack card to full-width on small screens */
    @media (max-width: 520px) {
      .edit-card { margin:18px; padding:18px; border-radius:12px; }
      h2 { font-size:18px; margin-bottom:10px }
      input[type="text"], input[type="email"] { font-size:18px; padding:12px }
      .form-actions { flex-direction:column-reverse; align-items:stretch }
      .form-actions .btn { width:100%; padding:14px; font-size:16px }
      .form-row { margin-bottom:14px }
    }
    </style>
</head>
<body class="dashboard-page">
  <main class="dashboard-shell">
    <div class="edit-card">
      <h2>Edit user — {{ target.username }}</h2>
      <form method="post">
        {% csrf_token %}
        <div class="form-row">
          <label for="first_name">First name</label>
          <input id="first_name" name="first_name" type="text" value="{{ target.first_name }}">
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" value="{{ target.email }}">
        </div>
        <div class="form-row">
          <label>
            <input type="checkbox" name="is_active" {% if target.is_active %}checked{% endif %}> Active
          </label>
        </div>
        {% if can_toggle_staff %}
        <div class="form-row">
          <label>
            <input type="checkbox" name="is_staff" {% if target.is_staff %}checked{% endif %}> Staff (admin)
          </label>
        </div>
        {% endif %}

        <div class="form-actions">
          <button class="btn primary" type="submit">Save</button>
          <a class="btn ghost" href="{% url 'admin_users' %}">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
